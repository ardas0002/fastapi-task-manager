<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Created</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .project-name {
            display: inline-block;
            padding: 8px 16px;
            margin: 10px 0;
            background-color: #e8f4fd;
            color: #007bff;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Project Created!</h1>
        <p>Your new project has been successfully created:</p>
        <div class="project-name">{{ project_name }}</div>
        <p>You can now start adding tasks and collaborating with your team.</p>
        <p>Cheers,<br>The Task Manager Team</p>
    </div>
</body>
</html>
